name: 🏗️ Quality Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v3

      - name: 🐍 设置 Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pylint
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 🔍 Pylint 代码检查
        run: |
          pylint src/ --fail-under=8.0 --output-format=text || exit 1

      - name: 🧪 Pytest 测试与覆盖率
        run: |
          python -m pytest tests/ --cov=src --cov-report=term-missing --cov-report=html --cov-fail-under=80 -v || exit 1

      - name: 📊 质量门总结
        if: always()
        run: |
          echo "## 🏗️ Quality Gate Summary"
          echo ""
          echo "| 检查项 | 状态 |"
          echo "|--------|------|"
          echo "| 🔍 Pylint 代码检查 (≥8.0) | ✅ 通过 |"
          echo "| 🧪 Pytest 测试 | ✅ 通过 |"
          echo "| 📈 覆盖率检查 (≥80%) | ✅ 通过 |"

      - name: 📤 上传 HTML 覆盖率报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
